name: Sync Upstream, Patch and Release

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-patch-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Custom Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Home Assistant Core (Master stable branch)
        run: |
          git clone --depth 1 -b master https://github.com/home-assistant/core.git ha-core

      - name: Sync homekit_controller folder
        run: |
          rm -rf custom_components/homekit_controller
          mkdir -p custom_components
          cp -r ha-core/homeassistant/components/homekit_controller custom_components/
          rm -rf ha-core

      - name: Inject Version into manifest.json
        run: |
          VERSION=$(date +%Y.%m.%d)
          sudo apt-get install -y jq
          jq --arg ver "$VERSION" '. + {version: $ver}' custom_components/homekit_controller/manifest.json > tmp.json
          mv tmp.json custom_components/homekit_controller/manifest.json
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Apply Vimar Patch dynamically (Python)
        run: |
          python3 -c '
          import sys
          file_path = "custom_components/homekit_controller/light.py"
          with open(file_path, "r") as f:
              lines = f.readlines()
          
          out = []
          replaced = False
          for line in lines:
              if "characteristics[CharacteristicsTypes.ON] = True" in line and not replaced:
                  indent = line.split("characteristics")[0]
                  out.append(indent + "manufacturer = (\n")
                  out.append(indent + "    getattr(self.service.accessory, \"manufacturer\", \"\")\n")
                  out.append(indent + "    if self.service and self.service.accessory\n")
                  out.append(indent + "    else \"\"\n")
                  out.append(indent + ")\n\n")
                  out.append(indent + "# VIMAR WORKAROUND: Omit ON command if sending other characteristics\n")
                  out.append(indent + "if not characteristics or manufacturer != \"Vimar\":\n")
                  out.append(indent + "    characteristics[CharacteristicsTypes.ON] = True\n")
                  replaced = True
              else:
                  out.append(line)
          
          with open(file_path, "w") as f:
              f.writelines(out)
          
          if not replaced:
              print("Errore: Impossibile trovare la riga originale nel file di Home Assistant.")
              sys.exit(1)
          '

      - name: Process Commit and GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add custom_components/
          
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento rilevato dall'upstream."
          else
            git commit -m "Sync upstream and apply Vimar dimmer fix (${{ env.VERSION }})"
            git push origin main
            
            git tag ${{ env.VERSION }}
            git push origin ${{ env.VERSION }}
            
            gh release create ${{ env.VERSION }} \
              --title "Release ${{ env.VERSION }}" \
              --notes "Automated sync with Home Assistant core (master). Vimar dimmer patch successfully applied."
          fi
